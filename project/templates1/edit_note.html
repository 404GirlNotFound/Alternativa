<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Uredi zapisek</title>
</head>
<body>
    <h2>Uredi zapisek</h2>

    <form action="/edit_note/{{ note_id }}" method="post">
        <input type="text" name="title" value="{{ note.title }}" required>
        <br><br>
        <textarea name="content" cols="50" rows="10" required>{{ note.content }}</textarea>
        <br><br>
        <button type="submit">Shrani</button>
    </form>

    <a href="/">Nazaj</a>
</body>
</html>
